services:
  youtubepot-bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: always
    expose:
      - "4416"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4416').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 30

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: always
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_LOCAL=1
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
      - ./downloads:/app/downloads:ro
    ports:
      - "8081:8081"

  bot:
    build: .
    restart: always
    depends_on:
      - youtubepot-bgutil
      - telegram-bot-api
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - DB_PATH=/app/data/bot.db
      - MAX_CONCURRENT_DOWNLOADS=${MAX_CONCURRENT_DOWNLOADS}
      - TELEGRAM_API_BASE=http://telegram-bot-api:8081
      - TELEGRAM_IS_LOCAL_API=1
      - TELEGRAM_REQUEST_TIMEOUT=7200
      - TELEGRAM_SEND_TIMEOUT=7200
      - TELEGRAM_MAX_UPLOAD_BYTES=1992294400
      - TELEGRAM_FALLBACK_UPLOAD_BYTES=1887436800
      - TELEGRAM_HARD_LIMIT_BYTES=2097152000
      - YTDLP_COOKIE_FILE=${YTDLP_COOKIE_FILE}
      - YTDLP_COOKIE_DIR=${YTDLP_COOKIE_DIR}
      - YTDLP_COOKIES_FROM_BROWSER=${YTDLP_COOKIES_FROM_BROWSER}
      - YTDLP_PROXY=${YTDLP_PROXY}
      - YTDLP_PROXY_LIST=${YTDLP_PROXY_LIST}
      - YTDLP_YOUTUBE_PROXY=${YTDLP_YOUTUBE_PROXY}
      - YTDLP_YOUTUBE_PROXY_LIST=${YTDLP_YOUTUBE_PROXY_LIST}
      - YTDLP_USER_AGENT=${YTDLP_USER_AGENT}
      - YTDLP_REMOTE_COMPONENTS=${YTDLP_REMOTE_COMPONENTS}
      - YTDLP_FORCE_IPV4=${YTDLP_FORCE_IPV4}
      - YTDLP_SOCKET_TIMEOUT=${YTDLP_SOCKET_TIMEOUT}
      - YTDLP_RETRIES=${YTDLP_RETRIES}
      - YTDLP_SKIP_YOUTUBETAB_AUTHCHECK=${YTDLP_SKIP_YOUTUBETAB_AUTHCHECK}
      - YTDLP_PLAYLIST_END=${YTDLP_PLAYLIST_END}
      - YTDLP_OVERALL_TIMEOUT=${YTDLP_OVERALL_TIMEOUT}
      - YTDLP_YOUTUBE_LOGIN_RETRIES=${YTDLP_YOUTUBE_LOGIN_RETRIES}
      - YTDLP_YOUTUBE_POT_BASE_URL=${YTDLP_YOUTUBE_POT_BASE_URL:-http://youtubepot-bgutil:4416}
      - YTDLP_YOUTUBE_PLAYER_CLIENTS=${YTDLP_YOUTUBE_PLAYER_CLIENTS:-mweb,web_safari,android,ios,web}
      - SPOTDL_TIMEOUT=${SPOTDL_TIMEOUT}
      - SPOTDL_CLIENT_ID=${SPOTDL_CLIENT_ID}
      - SPOTDL_CLIENT_SECRET=${SPOTDL_CLIENT_SECRET}
      - SPOTIFY_USE_SPOTDL=${SPOTIFY_USE_SPOTDL}
      - TELEGRAM_COMPRESS_TIMEOUT=180
      - TELEGRAM_ENABLE_COMPRESSION=1
      - TELEGRAM_DELIVERY_MODE=direct
      - DOWNLOAD_RETENTION_HOURS=${DOWNLOAD_RETENTION_HOURS}
      - CLEANUP_INTERVAL_SECONDS=${CLEANUP_INTERVAL_SECONDS}

  admin-bot:
    build: .
    restart: always
    depends_on:
      - youtubepot-bgutil
      - telegram-bot-api
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
    command: ["python", "-m", "bot.admin_main"]
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_BOT_TOKEN=${ADMIN_BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - DB_PATH=/app/data/bot.db
      - MAX_CONCURRENT_DOWNLOADS=${MAX_CONCURRENT_DOWNLOADS}
      - TELEGRAM_API_BASE=http://telegram-bot-api:8081
      - TELEGRAM_IS_LOCAL_API=1
      - TELEGRAM_REQUEST_TIMEOUT=7200
      - TELEGRAM_SEND_TIMEOUT=7200
      - TELEGRAM_MAX_UPLOAD_BYTES=1992294400
      - TELEGRAM_FALLBACK_UPLOAD_BYTES=1887436800
      - TELEGRAM_HARD_LIMIT_BYTES=2097152000
      - YTDLP_COOKIE_FILE=${YTDLP_COOKIE_FILE}
      - YTDLP_COOKIE_DIR=${YTDLP_COOKIE_DIR}
      - YTDLP_COOKIES_FROM_BROWSER=${YTDLP_COOKIES_FROM_BROWSER}
      - YTDLP_PROXY=${YTDLP_PROXY}
      - YTDLP_PROXY_LIST=${YTDLP_PROXY_LIST}
      - YTDLP_YOUTUBE_PROXY=${YTDLP_YOUTUBE_PROXY}
      - YTDLP_YOUTUBE_PROXY_LIST=${YTDLP_YOUTUBE_PROXY_LIST}
      - YTDLP_USER_AGENT=${YTDLP_USER_AGENT}
      - YTDLP_REMOTE_COMPONENTS=${YTDLP_REMOTE_COMPONENTS}
      - YTDLP_FORCE_IPV4=${YTDLP_FORCE_IPV4}
      - YTDLP_SOCKET_TIMEOUT=${YTDLP_SOCKET_TIMEOUT}
      - YTDLP_RETRIES=${YTDLP_RETRIES}
      - YTDLP_SKIP_YOUTUBETAB_AUTHCHECK=${YTDLP_SKIP_YOUTUBETAB_AUTHCHECK}
      - YTDLP_PLAYLIST_END=${YTDLP_PLAYLIST_END}
      - YTDLP_OVERALL_TIMEOUT=${YTDLP_OVERALL_TIMEOUT}
      - YTDLP_YOUTUBE_LOGIN_RETRIES=${YTDLP_YOUTUBE_LOGIN_RETRIES}
      - YTDLP_YOUTUBE_POT_BASE_URL=${YTDLP_YOUTUBE_POT_BASE_URL:-http://youtubepot-bgutil:4416}
      - YTDLP_YOUTUBE_PLAYER_CLIENTS=${YTDLP_YOUTUBE_PLAYER_CLIENTS:-mweb,web_safari,android,ios,web}
      - SPOTDL_TIMEOUT=${SPOTDL_TIMEOUT}
      - SPOTDL_CLIENT_ID=${SPOTDL_CLIENT_ID}
      - SPOTDL_CLIENT_SECRET=${SPOTDL_CLIENT_SECRET}
      - SPOTIFY_USE_SPOTDL=${SPOTIFY_USE_SPOTDL}
      - TELEGRAM_COMPRESS_TIMEOUT=180
      - TELEGRAM_ENABLE_COMPRESSION=1
      - TELEGRAM_DELIVERY_MODE=direct
      - DOWNLOAD_RETENTION_HOURS=${DOWNLOAD_RETENTION_HOURS}
      - CLEANUP_INTERVAL_SECONDS=${CLEANUP_INTERVAL_SECONDS}

volumes:
  telegram-bot-api-data:
