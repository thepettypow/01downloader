services:
  bot:
    build: .
    restart: always
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - DB_PATH=/app/data/bot.db
      - YTDLP_COOKIE_FILE=${YTDLP_COOKIE_FILE}
      - YTDLP_PROXY=${YTDLP_PROXY}
      - YTDLP_USER_AGENT=${YTDLP_USER_AGENT}
      - YTDLP_REMOTE_COMPONENTS=${YTDLP_REMOTE_COMPONENTS}
      - YTDLP_FORCE_IPV4=${YTDLP_FORCE_IPV4}
      - YTDLP_SOCKET_TIMEOUT=${YTDLP_SOCKET_TIMEOUT}
      - YTDLP_RETRIES=${YTDLP_RETRIES}
      - YTDLP_SKIP_YOUTUBETAB_AUTHCHECK=${YTDLP_SKIP_YOUTUBETAB_AUTHCHECK}
      - YTDLP_PLAYLIST_END=${YTDLP_PLAYLIST_END}
      - YTDLP_OVERALL_TIMEOUT=${YTDLP_OVERALL_TIMEOUT}
      - TELEGRAM_REQUEST_TIMEOUT=${TELEGRAM_REQUEST_TIMEOUT}
      - TELEGRAM_SEND_TIMEOUT=${TELEGRAM_SEND_TIMEOUT}
      - TELEGRAM_COMPRESS_TIMEOUT=${TELEGRAM_COMPRESS_TIMEOUT}
      - TELEGRAM_MAX_UPLOAD_BYTES=${TELEGRAM_MAX_UPLOAD_BYTES}
      - TELEGRAM_FALLBACK_UPLOAD_BYTES=${TELEGRAM_FALLBACK_UPLOAD_BYTES}
      - TELEGRAM_HARD_LIMIT_BYTES=${TELEGRAM_HARD_LIMIT_BYTES}
      - TELEGRAM_ENABLE_COMPRESSION=${TELEGRAM_ENABLE_COMPRESSION}
      - TELEGRAM_DELIVERY_MODE=${TELEGRAM_DELIVERY_MODE}
